services:
  - type: web
    name: voig-bot
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: run
      - key: TELEGRAM_BOT_TOKEN
        scope: run
